<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Black background -->
  <rect width="64" height="64" fill="#000000"/>

  <!-- Pixel-art satellite dish / uplink antenna -->
  <!-- Base platform -->
  <rect x="26" y="54" width="12" height="4" fill="#33FF33"/>
  <rect x="22" y="58" width="20" height="4" fill="#33FF33"/>

  <!-- Antenna mast -->
  <rect x="30" y="28" width="4" height="26" fill="#33FF33"/>

  <!-- Dish (parabolic shape built from pixel rows) -->
  <rect x="8"  y="28" width="4" height="4" fill="#33FF33"/>
  <rect x="12" y="24" width="4" height="4" fill="#33FF33"/>
  <rect x="16" y="20" width="4" height="4" fill="#33FF33"/>
  <rect x="20" y="18" width="4" height="4" fill="#33FF33"/>
  <rect x="24" y="16" width="4" height="4" fill="#33FF33"/>
  <rect x="28" y="16" width="8" height="4" fill="#33FF33"/>
  <rect x="36" y="16" width="4" height="4" fill="#33FF33"/>
  <rect x="40" y="18" width="4" height="4" fill="#33FF33"/>
  <rect x="44" y="20" width="4" height="4" fill="#33FF33"/>
  <rect x="48" y="24" width="4" height="4" fill="#33FF33"/>
  <rect x="52" y="28" width="4" height="4" fill="#33FF33"/>

  <!-- Signal waves radiating from dish -->
  <!-- Wave 1 (inner) -->
  <rect x="14" y="10" width="4" height="4" fill="#33FF33" opacity="0.9"/>
  <rect x="10" y="6"  width="4" height="4" fill="#33FF33" opacity="0.9"/>

  <!-- Wave 2 (outer) -->
  <rect x="6"  y="10" width="4" height="4" fill="#33FF33" opacity="0.5"/>
  <rect x="2"  y="6"  width="4" height="4" fill="#33FF33" opacity="0.5"/>
  <rect x="2"  y="2"  width="4" height="4" fill="#33FF33" opacity="0.5"/>

  <!-- Small cursor/prompt indicator top-right -->
  <rect x="54" y="4" width="6" height="4" fill="#33FF33" opacity="0.7"/>
</svg>
