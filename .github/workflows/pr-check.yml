name: PR Check

on:
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    name: Lint, Type Check, Test & Build
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc -b

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Check bundle size
        run: |
          echo "=== Bundle Size Report ==="
          du -sh dist/
          echo "--- Individual assets ---"
          find dist/assets -type f -printf '%s %p\n' | sort -rn | head -20 | awk '{printf "%.1fKB %s\n", $1/1024, $2}'
          LARGE=$(find dist/assets -type f -size +500k)
          if [ -n "$LARGE" ]; then
            echo "::warning::Chunks over 500KB detected:"
            echo "$LARGE"
          fi
